<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Number Challenge</title><link rel='stylesheet' href='style.css'></head><body>
<div class='bgtext' id='bgtext'>✨ FIND THE NUMBER ✨</div>
<div class='game'>
<h1>🎯 Number Challenge</h1>
<div id='status'>Player 1 write your number</div>
<div id='counter'></div>
<input id='secret' type='number' placeholder='Choose number 0-100'>
<button id='startBtn'>Start Game</button>
<div id='guessArea' class='hide'>
<input id='guess' type='number' placeholder='Guess number'>
<button id='guessBtn'>Guess</button>
</div>
<div id='message'></div>
</div>
<p id='credits'>Created by Maher Murad &amp; Ayaz Yousif</p>
<script src='script.js'></script></body></html>
